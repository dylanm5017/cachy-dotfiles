[env]
TERM = "xterm-256color"

[window]
opacity = 0.85
dynamic_padding = true
padding = { x = 12, y = 12 }
decorations = "full"
title = "Alacritty@CachyOS"

[font]
size = 12

[font.normal]
family = "Iosevka Nerd Font"
style = "Regular"

[font.bold]
family = "Iosevka Nerd Font "
style = "Bold"

[font.italic]
family = "Iosevka Nerd Font "
style = "Italic"

[font.bold_italic]
family = "Iosevka Nerd Font "
style = "Bold Italic"

[cursor]
style = "Block"
unfocused_hollow = true

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[general]
live_config_reload = true
import = ["~/.config/alacritty/catppuccin-mocha.toml"]