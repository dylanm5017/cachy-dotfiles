"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$character
"""

right_format = """
$nodejs\
$cmd_duration\
$time
"""

palette = 'catppuccin_frappe'


[directory]
style = "italic #8caaee"
truncation_length = 2
home_symbol = "~"
format = "[$path]($style) "

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
format = "[$symbol $branch]($style) "
style = "#a6d189"



[nodejs]
symbol = "Ņ£ś"
style = "bg:green"
format = "[Ņ£ś $version](#a6d189) "
detect_files = ["package.json"]

[c]
symbol = "Ņś× "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "Ņ×©"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "Ņś¦"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "Ņśł"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "Ņē¢ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "Ņś┤"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "Ņś¤"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "Ņśå"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = "’īł"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[conda]
symbol = " ’äī "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false


[line_break]
disabled = true

[character]
success_symbol = "[Ō×£](#a6d189)"
error_symbol = "[Ō×£](#e78284)"

[cmd_duration]
format = "[$duration](#e5c890) "
min_time = 2000

[time]
disabled = false
format = "[’ĆŚ $time](#babbf1)"
time_format = "%R"

